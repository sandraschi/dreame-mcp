name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - run: uv sync --frozen --dev
      - run: uv run ruff check src/

  test-mocked:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - run: uv sync --frozen --dev
        # Mocked mode: no cloud credentials, no Tasshack ref clone needed.
        # Tests use synthetic fixtures from conftest.py.
      - run: uv run pytest tests/ -v --tb=short -x
        env:
          PYTHONPATH: src

  # Live tests are NOT run in CI — they need real hoover + cloud credentials.
  # Run locally with: DREAME_LIVE=1 uv run pytest tests/ -v --live
